<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ticket à Gratter - Bad Bunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* Empêche le scroll sur mobile en grattant */
        }

        .scratch-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.2);
            overflow: hidden;
            border: 4px solid #333;
        }

        /* Le lot caché sous le ticket */
        .prize-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #1a1a1a,
                #1a1a1a 10px,
                #111 10px,
                #111 20px
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 1;
        }

        .prize-title {
            font-family: 'Permanent Marker', cursive;
            color: #ff6600;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 102, 0, 0.8), 0 0 20px rgba(255, 102, 0, 0.5);
            transform: rotate(-5deg);
            margin-bottom: 10px;
        }

        .prize-amount {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0px #ff6600;
        }

        /* Le canvas que l'on gratte */
        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
            transition: opacity 0.5s ease;
        }

        /* Animation quand on a fini de gratter */
        .revealed #scratchCanvas {
            opacity: 0;
            pointer-events: none;
        }

        .revealed .prize-container {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .glitch-text {
            font-family: 'Permanent Marker', cursive;
            color: #fff;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-8">
        <h1 class="text-4xl glitch-text mb-2 text-white">GRATTE MOI</h1>
        <p class="text-gray-400 text-sm">Utilise ton doigt ou ta souris pour découvrir le lot.</p>
    </div>

    <!-- Conteneur principal du jeu -->
    <div class="scratch-wrapper" id="scratchWrapper">
        <div class="prize-container">
            <div class="prize-title">JACKPOT !</div>
            <div class="prize-amount">666 €</div>
        </div>
        <canvas id="scratchCanvas" width="320" height="320"></canvas>
    </div>

    <button id="resetBtn" class="mt-10 px-8 py-3 bg-[#ff6600] text-black font-bold rounded-full hover:bg-orange-600 transition-colors hidden font-[Permanent Marker] uppercase tracking-wider">
        Rejouer
    </button>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const wrapper = document.getElementById('scratchWrapper');
        const resetBtn = document.getElementById('resetBtn');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let isRevealed = false;
        let scratchCount = 0; // Sécurité CORS (compteur de grattage)

        // Initialisation
        function init() {
            // Remettre le mode de dessin par défaut
            ctx.globalCompositeOperation = 'source-over';
            isRevealed = false;
            scratchCount = 0;
            wrapper.classList.remove('revealed');
            resetBtn.classList.add('hidden');
            
            // Chargement de l'image externe depuis l'URL
            const img = new Image();
            img.crossOrigin = "Anonymous"; // Autorisation demandée pour analyser l'image ensuite
            
            img.onload = function() {
                // On dessine l'image sur tout le canvas (320x320)
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                // Activer le mode "gomme" (destination-out) pour le grattage
                ctx.globalCompositeOperation = 'destination-out';
            };
            
            // En cas d'erreur de chargement de l'image (lien mort, etc.)
            img.onerror = function() {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4400';
                ctx.font = '20px Roboto';
                ctx.fillText('Image introuvable', 70, 160);
                ctx.globalCompositeOperation = 'destination-out';
            };
            
            // Application de votre lien Goopics
            img.src = 'https://i.goopics.net/8pe58e.png';
        }

        // Coordonnées exactes selon l'événement (souris ou doigt)
        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDrawing(e) {
            if (isRevealed) return;
            isDrawing = true;
            const pos = getEventPos(e);
            lastX = pos.x;
            lastY = pos.y;
            scratch(e); // Gratte un point initial
        }

        function stopDrawing() {
            isDrawing = false;
            if (!isRevealed) {
                checkWinPercentage();
            }
        }

        function scratch(e) {
            if (!isDrawing || isRevealed) return;
            e.preventDefault(); // Empêche le scroll sur mobile

            const pos = getEventPos(e);
            const currentX = pos.x;
            const currentY = pos.y;

            ctx.beginPath();
            ctx.lineWidth = 35; // Taille de la "pièce" qui gratte
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();

            lastX = currentX;
            lastY = currentY;
            scratchCount++; // On compte les coups de "grattage" pour la sécurité
        }

        // Vérifie la proportion de zone grattée
        function checkWinPercentage() {
            try {
                // Tente de lire les pixels restants sur le Canvas
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let transparentPixels = 0;
                const totalPixels = pixels.length / 4;

                // On vérifie le canal alpha (opacité) de chaque pixel (1 pixel sur 4 pour optimiser)
                for (let i = 3; i < pixels.length; i += 16) {
                    if (pixels[i] === 0) {
                        transparentPixels++;
                    }
                }

                const percentage = (transparentPixels / (totalPixels / 4)) * 100;

                // Si plus de 55% de la surface est grattée, on révèle tout
                if (percentage > 55) {
                    triggerWin();
                }
            } catch (error) {
                // FALLBACK CORS : Si Goopics bloque la sécurité du Canvas ("Tainted Canvas"),
                // on bascule sur une victoire basée sur la quantité de coups de grattage.
                if (scratchCount > 150) {
                    triggerWin();
                }
            }
        }

        // Fonction de victoire centrale
        function triggerWin() {
            isRevealed = true;
            wrapper.classList.add('revealed');
            resetBtn.classList.remove('hidden');
        }

        // Écouteurs d'événements pour la souris
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', stopDrawing);

        // Écouteurs d'événements pour le tactile (mobile)
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', scratch, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        // Bouton rejouer
        resetBtn.addEventListener('click', init);

        // Lancement au chargement
        window.onload = init;

    </script>
</body>
</html>
